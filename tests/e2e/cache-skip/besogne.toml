name = "cache-skip"
description = "Second run skips if inputs unchanged"

type = "component"

[nodes.input-file]
type = "file"
path = "input.txt"

[nodes.mark]
type = "command"
phase = "exec"
run = ["sh", "-c", "echo ran >> marker.txt"]

[nodes.mark-exit]
type = "std"
stream = "exit_code"
expect = "0"
parents = ["mark"]
