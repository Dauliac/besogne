name = "multi-probe"
description = "Test all native probe types"

[nodes.HOME]
type = "env"

[nodes.USER]
type = "env"

[nodes.CUSTOM]
type = "env"
value = "/tmp/besogne-probe"

[nodes.data-file]
type = "file"
path = "data.txt"

[nodes."coreutils/shell"]
type = "plugin"

[nodes.platform]
type = "platform"

[nodes.user-check]
type = "user"

[nodes.cpu]
type = "metric"
metric = "cpu.count"

[nodes.memory]
type = "metric"
metric = "memory.available_mb"

[nodes.dns-localhost]
type = "dns"
host = "localhost"

[nodes.summary]
type = "command"
phase = "exec"
run = ["echo", "all-probes-passed"]
