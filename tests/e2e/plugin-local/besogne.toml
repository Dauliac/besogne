name = "plugin-local"
description = "Test local JSON plugin expansion"

[plugins]
test = "./plugins"

[nodes."test/greet"]
type = "plugin"

[nodes."test/greet".overrides.greet]
run = ["echo", "hello from plugin"]

[nodes."test/greet".overrides.greet-loud]
run = ["sh", "-c", "echo 'hello from plugin' | tr a-z A-Z"]
