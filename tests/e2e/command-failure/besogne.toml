name = "failure-stops"
description = "Failing command prevents dependents from running"
verify_first_run = false

[inputs.fail]
type = "command"
phase = "exec"
run = ["sh", "-c", "echo 'this fails'; exit 1"]

[inputs.should-skip]
type = "command"
phase = "exec"
run = ["sh", "-c", "echo 'THIS_MUST_NOT_RUN' >> leaked.txt"]
after = ["fail"]
