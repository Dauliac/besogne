name = "script-build"
description = "Build pipeline using a shell script with env vars and outputs"

[nodes."coreutils/shell"]
type = "plugin"

[nodes.build-script]
type = "file"
path = "build.sh"

[nodes.source-file]
type = "file"
path = "src/app.txt"

[nodes.PROJECT_NAME]
type = "env"
value = "myapp"

[nodes.PROJECT_VERSION]
type = "env"
value = "1.0.0"

[nodes.setup]
type = "command"
phase = "exec"
run = ["sh", "-c", "mkdir -p dist"]

[nodes.build]
type = "command"
phase = "exec"
run = { file = "./build.sh" }
parents = ["setup"]
