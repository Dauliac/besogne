name = "docker-alpine"
description = "Run a command inside an Alpine container"

[nodes."docker/docker"]
type = "component"

[nodes.run-alpine]
type = "command"
phase = "exec"
run = ["docker", "run", "--rm", "alpine:3.20", "echo", "hello from alpine"]

[nodes.run-alpine-stdout]
type = "std"
stream = "stdout"
contains = ["hello from alpine"]
parents = ["run-alpine"]
