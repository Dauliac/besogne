name = "isolation-strict"
description = "Strict env sandbox — only declared vars visible"
sandbox = "strict"

[nodes."coreutils/shell"]
type = "component"

[nodes.ALLOWED_VAR]
type = "env"
value = "visible"

[nodes.check]
type = "command"
phase = "exec"
run = ["sh", "-c", "echo ALLOWED=$ALLOWED_VAR HOME=$HOME"]

[nodes.check-stdout]
type = "std"
stream = "stdout"
contains = ["ALLOWED=visible"]
parents = ["check"]
