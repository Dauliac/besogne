name = "pipe-exec"
description = "Test pipe exec form — echo | tr"

type = "component"

[nodes."coreutils/shell"]
type = "component"

[nodes.pipe-test]
type = "command"
phase = "exec"
run = "echo hello world | tr a-z A-Z"

[nodes.pipe-stdout]
type = "std"
stream = "stdout"
contains = ["HELLO WORLD"]
parents = ["pipe-test"]
