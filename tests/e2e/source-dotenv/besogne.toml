name = "source-dotenv"
description = "Load env vars from .env file via source type"

type = "component"

[nodes."coreutils/shell"]
type = "component"

[nodes.dotenv]
type = "source"
format = "dotenv"
path = ".env"

[nodes.check]
type = "command"
phase = "exec"
run = ["sh", "-c", "echo DB=$DATABASE_URL NAME=$APP_NAME"]

[nodes.check-stdout]
type = "std"
stream = "stdout"
contains = ["DB=", "NAME="]
parents = ["check"]
