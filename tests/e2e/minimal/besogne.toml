name = "minimal"
description = "Smallest valid besogne"

[nodes.hello]
type = "command"
phase = "exec"
run = ["echo", "hello from besogne"]

[nodes.hello-stdout]
type = "std"
stream = "stdout"
contains = ["hello from besogne"]
parents = ["hello"]

[nodes.hello-exit]
type = "std"
stream = "exit_code"
expect = "0"
parents = ["hello"]
