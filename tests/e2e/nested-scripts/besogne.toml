name = "nested-scripts"
description = "Nested shell scripts: 3 levels deep, forks, sleep, pipes, traps"

[nodes."coreutils/shell"]
type = "component"

[nodes.level1]
type = "file"
path = "level1.sh"

[nodes.level2]
type = "file"
path = "level2.sh"

[nodes.level3]
type = "file"
path = "level3.sh"

[nodes.forker]
type = "file"
path = "forker.sh"

[nodes.setup]
type = "command"
phase = "exec"
run = ["sh", "-c", "rm -rf results && mkdir -p results"]

[nodes.run-scripts]
type = "command"
phase = "exec"
run = { file = "./level1.sh" }
parents = ["setup"]

[nodes.verify]
type = "command"
phase = "exec"
run = ["sh", "-c", "cat results/level1.txt results/level2.txt results/level3.txt results/forks.txt results/background.txt results/pipe.txt results/heredoc.txt results/forked.txt"]
parents = ["run-scripts"]

[nodes.verify-exit]
type = "std"
stream = "exit_code"
expect = "0"
parents = ["verify"]
