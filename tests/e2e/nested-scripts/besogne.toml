name = "nested-scripts"
description = "Nested shell scripts: 3 levels deep, forks, sleep, pipes, traps"

[nodes.sh]
type = "binary"

[nodes.head]
type = "binary"

[nodes.od]
type = "binary"

[nodes.tr]
type = "binary"

[nodes.tee]
type = "binary"

[nodes.cat]
type = "binary"

[nodes.date]
type = "binary"

[nodes.sleep]
type = "binary"

[nodes.mkdir]
type = "binary"

[nodes.rm]
type = "binary"

[nodes.seq]
type = "binary"

[nodes.level1]
type = "file"
path = "level1.sh"

[nodes.level2]
type = "file"
path = "level2.sh"

[nodes.level3]
type = "file"
path = "level3.sh"

[nodes.forker]
type = "file"
path = "forker.sh"

[nodes.setup]
type = "command"
phase = "exec"
run = ["sh", "-c", "rm -rf results && mkdir -p results"]

[nodes.run-scripts]
type = "command"
phase = "exec"
run = { file = "./level1.sh" }
parents = ["setup"]

[nodes.verify]
type = "command"
phase = "exec"
run = ["sh", "-c", "cat results/level1.txt results/level2.txt results/level3.txt results/forks.txt results/background.txt results/pipe.txt results/heredoc.txt results/forked.txt"]
parents = ["run-scripts"]
