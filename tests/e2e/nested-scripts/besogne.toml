name = "nested-scripts"
description = "Nested shell scripts with env-driven configuration"

[plugins]
coreutils = "builtin"

[inputs.shell]
type = "plugin"
plugin = "coreutils/shell"

# Environment variables used by the scripts
[inputs.PROJECT_NAME]
type = "env"
value = "besogne-nested"

[inputs.OUTPUT_PREFIX]
type = "env"
value = "results"

[inputs.FORK_COUNT]
type = "env"
value = "3"

[inputs.SLEEP_DELAY]
type = "env"
value = "0.02"

[inputs.level1]
type = "file"
path = "level1.sh"

[inputs.level2]
type = "file"
path = "level2.sh"

[inputs.level3]
type = "file"
path = "level3.sh"

[inputs.setup]
type = "command"
phase = "exec"
run = ["sh", "-c", "rm -rf $OUTPUT_PREFIX && mkdir -p $OUTPUT_PREFIX"]

[inputs.run-scripts]
type = "command"
phase = "exec"
run = { file = "./level1.sh" }
parents = ["setup"]

[[inputs.run-scripts.postconditions]]
type = "file"
path = "results/level1.txt"
required = true

[[inputs.run-scripts.postconditions]]
type = "file"
path = "results/level2.txt"
required = true

[[inputs.run-scripts.postconditions]]
type = "file"
path = "results/level3.txt"
required = true

[[inputs.run-scripts.postconditions]]
type = "file"
path = "results/forks.txt"
required = true

[[inputs.run-scripts.postconditions]]
type = "file"
path = "results/background.txt"
required = true

[[inputs.run-scripts.postconditions]]
type = "file"
path = "results/pipe.txt"
required = true

[[inputs.run-scripts.postconditions]]
type = "file"
path = "results/heredoc.txt"
required = true
