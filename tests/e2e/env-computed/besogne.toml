name = "env-computed"
description = "Set computed env vars with value field"

type = "component"

[nodes.MY_VAR]
type = "env"
value = "/custom/path"

[nodes.ANOTHER]
type = "env"
value = "hello-world"

[nodes.check]
type = "command"
phase = "exec"
run = ["sh", "-c", "echo MY_VAR=$MY_VAR ANOTHER=$ANOTHER"]

[nodes.check-stdout]
type = "std"
stream = "stdout"
contains = ["MY_VAR=/custom/path", "ANOTHER=hello-world"]
parents = ["check"]
