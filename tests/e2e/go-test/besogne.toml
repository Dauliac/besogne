name = "go-test"
description = "Run Go tests"

[nodes."go/toolchain"]
type = "plugin"

[nodes.go-mod]
type = "file"
path = "go.mod"

[nodes.main-go]
type = "file"
path = "main.go"

[nodes.test-go]
type = "file"
path = "main_test.go"

[nodes.mod-tidy]
type = "command"
phase = "exec"
run = ["go", "mod", "tidy"]

[nodes.mod-download]
type = "command"
phase = "exec"
run = ["go", "mod", "download"]
parents = ["mod-tidy"]

[nodes.mod-download-exit]
type = "std"
stream = "exit_code"
expect = "0"
parents = ["mod-download"]

[nodes.test]
type = "command"
phase = "exec"
run = ["go", "test", "-v", "./..."]
parents = ["mod-download-exit"]
force_args = ["-count=1"]
debug_args = ["-v"]

[nodes.test-stdout]
type = "std"
stream = "stdout"
contains = ["PASS"]
parents = ["test"]

[nodes.test-exit]
type = "std"
stream = "exit_code"
expect = "0"
parents = ["test"]
