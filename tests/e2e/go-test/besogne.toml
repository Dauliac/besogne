name = "go-test"
description = "Run Go tests"

[nodes.go]
type = "binary"

[nodes.go-mod]
type = "file"
path = "go.mod"

[nodes.main-go]
type = "file"
path = "main.go"

[nodes.test-go]
type = "file"
path = "main_test.go"

[nodes.mod-tidy]
type = "command"
phase = "exec"
run = ["go", "mod", "tidy"]

[nodes.mod-download]
type = "command"
phase = "exec"
run = ["go", "mod", "download"]
parents = ["mod-tidy"]

[nodes.mod-download.output]
exit_code = 0

[nodes.test]
type = "command"
phase = "exec"
run = ["go", "test", "-v", "./..."]
parents = ["mod-download"]
force_args = ["-count=1"]
debug_args = ["-v"]

[nodes.test.output]
exit_code = 0
stdout_contains = ["PASS"]
