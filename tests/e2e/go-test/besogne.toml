name = "go-test"
description = "Run Go tests"

[inputs.go]
type = "binary"

[inputs.go-mod]
type = "file"
path = "go.mod"

[inputs.main-go]
type = "file"
path = "main.go"

[inputs.test-go]
type = "file"
path = "main_test.go"

[inputs.mod-download]
type = "command"
phase = "exec"
run = ["go", "mod", "download"]

[inputs.mod-download.output]
exit_code = 0

[inputs.test]
type = "command"
phase = "exec"
run = ["go", "test", "-v", "./..."]
parents = ["mod-download"]

[inputs.test.output]
exit_code = 0
stdout_contains = ["PASS"]
