name = "env-secret"
description = "Secret env vars — value should not appear in besogne output"

type = "component"

[nodes.BESOGNE_E2E_SECRET]
type = "env"
secret = true

[nodes.ok]
type = "command"
phase = "exec"
run = ["echo", "secret-handled"]

[nodes.ok-stdout]
type = "std"
stream = "stdout"
contains = ["secret-handled"]
parents = ["ok"]
