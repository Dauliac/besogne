name = "npm-ci-pipeline"
description = "Full npm CI: install, lint, test, build"

[nodes.node]
type = "binary"

[nodes.npm]
type = "binary"

[nodes.CI]
type = "env"
value = "true"

[nodes.package-json]
type = "file"
path = "package.json"

[nodes.install]
type = "command"
phase = "exec"
run = ["npm", "install"]

[nodes.lint]
type = "command"
phase = "exec"
run = ["npm", "run", "lint"]
parents = ["install"]

[nodes.test]
type = "command"
phase = "exec"
run = ["npm", "test"]
parents = ["install"]

[nodes.build]
type = "command"
phase = "exec"
run = ["npm", "run", "build"]
parents = ["lint", "test"]
