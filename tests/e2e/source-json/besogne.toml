name = "source-json"
description = "Load env vars from JSON file via source type"

type = "component"

[nodes."coreutils/shell"]
type = "component"

[nodes.env-file]
type = "source"
format = "json"
path = "env.json"

[nodes.check]
type = "command"
phase = "exec"
run = ["sh", "-c", "echo GOPATH=$GOPATH CGO=$CGO_ENABLED"]

[nodes.check-stdout]
type = "std"
stream = "stdout"
contains = ["GOPATH=", "CGO="]
parents = ["check"]
