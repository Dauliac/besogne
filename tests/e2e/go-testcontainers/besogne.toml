name = "go-testcontainers"
description = "Run Go tests with testcontainers (Docker)"

[nodes."go/toolchain"]
type = "plugin"

[nodes."gcc/toolchain"]
type = "plugin"

[nodes."docker/docker"]
type = "plugin"

# go test produces a test binary named after the module
[nodes."testcontainers."]
type = "binary"
parents = ["go"]

[nodes.go-mod]
type = "file"
path = "go.mod"

[nodes.test-go]
type = "file"
path = "container_test.go"

[nodes.mod-tidy]
type = "command"
phase = "exec"
run = ["go", "mod", "tidy"]

[nodes.mod-download]
type = "command"
phase = "exec"
run = ["go", "mod", "download"]
parents = ["mod-tidy"]

[nodes.mod-download-exit]
type = "std"
stream = "exit_code"
expect = "0"
parents = ["mod-download"]

[nodes.test]
type = "command"
phase = "exec"
run = ["go", "test", "-v", "./..."]
parents = ["mod-download-exit"]
force_args = ["-count=1"]
debug_args = ["-v"]

[nodes.test-stdout]
type = "std"
stream = "stdout"
contains = ["PASS"]
parents = ["test"]

[nodes.test-exit]
type = "std"
stream = "exit_code"
expect = "0"
parents = ["test"]
