name = "go-testcontainers"
description = "Run Go tests with testcontainers (Docker)"

[nodes.go]
type = "binary"

[nodes.docker]
type = "binary"

# Go toolchain internals (spawned by `go test`, not in PATH)
[nodes.compile]
type = "binary"
parents = ["go"]

[nodes.link]
type = "binary"
parents = ["go"]

[nodes.vet]
type = "binary"
parents = ["go"]

[nodes.cgo]
type = "binary"
parents = ["go"]

# C compiler used by cgo for testcontainers native deps
[nodes.gcc]
type = "binary"

[nodes.cc1]
type = "binary"
parents = ["gcc"]

# go test produces a test binary named after the module
[nodes."testcontainers."]
type = "binary"
parents = ["go"]

[nodes.go-mod]
type = "file"
path = "go.mod"

[nodes.test-go]
type = "file"
path = "container_test.go"

[nodes.mod-tidy]
type = "command"
phase = "exec"
run = ["go", "mod", "tidy"]

[nodes.mod-download]
type = "command"
phase = "exec"
run = ["go", "mod", "download"]
parents = ["mod-tidy"]

[nodes.test]
type = "command"
phase = "exec"
run = ["go", "test", "-v", "./..."]
parents = ["mod-download"]
force_args = ["-count=1"]
debug_args = ["-v"]
