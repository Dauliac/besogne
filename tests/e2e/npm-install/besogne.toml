name = "npm-install"
description = "Install npm dependencies"

[nodes.node]
type = "binary"

[nodes.npm]
type = "binary"

[nodes.package-json]
type = "file"
path = "package.json"

[nodes.gen-lockfile]
type = "command"
phase = "exec"
run = ["npm", "install", "--package-lock-only"]
debug_args = ["--verbose"]

[[nodes.gen-lockfile.postconditions]]
type = "file"
path = "package-lock.json"
expect = "exists"
required = true

[nodes.install]
type = "command"
phase = "exec"
run = ["npm", "ci"]
parents = ["gen-lockfile"]
force_args = ["--force"]
debug_args = ["--verbose"]

[[nodes.install.postconditions]]
type = "file"
path = "node_modules"
expect = "directory"
required = true
