name = "npm-install"
description = "Install npm dependencies"

[nodes."node/toolchain"]
type = "plugin"

[nodes.package-json]
type = "file"
path = "package.json"

[nodes.gen-lockfile]
type = "command"
phase = "exec"
run = ["npm", "install", "--package-lock-only"]
debug_args = ["--verbose"]

[nodes.install]
type = "command"
phase = "exec"
run = ["npm", "ci"]
parents = ["gen-lockfile"]
force_args = ["--force"]
debug_args = ["--verbose"]
