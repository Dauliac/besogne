name = "npm-install"
description = "Install npm dependencies"

[inputs.node]
type = "binary"

[inputs.npm]
type = "binary"

[inputs.package-json]
type = "file"
path = "package.json"

[inputs.install]
type = "command"
phase = "exec"
run = ["npm", "install"]

[[inputs.install.postconditions]]
type = "file"
path = "node_modules"
expect = "directory"
required = true
